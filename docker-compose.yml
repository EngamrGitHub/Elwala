version: '3.8'

services:
  elwala-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ElwalaDb;User Id=sa;Password=Your_Str0ng_Passw0rd!;TrustServerCertificate=True;
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_Str0ng_Passw0rd!
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
